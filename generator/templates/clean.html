<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>{{PAGE_TITLE}}</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --text:#1c2430; --muted:#5b6675;
    --line:#e6e9ee; --accent:#2f6df6; --accent-ink:#ffffff; --radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;-webkit-text-size-adjust:100%}
  .wrap{max-width:480px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;box-shadow:0 1px 2px rgba(20,30,50,.04)}
  .head{padding:20px 20px 8px;text-align:center}
  .logo{width:72px;height:72px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 12px}
  .logo--placeholder{display:flex;align-items:center;justify-content:center;
    background:var(--accent);color:var(--accent-ink);font-weight:700;font-size:26px}
  h1{font-size:22px;margin:6px 0 4px}
  .tagline{color:var(--muted);margin:0 0 8px;font-size:15px}
  .hero{margin:12px 0 0}
  .hero__img{width:100%;height:auto;display:block}
  .hero--placeholder{height:150px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#eef2ff,#dfe7ff)}
  .hero__ph-text{color:var(--muted);font-size:14px;letter-spacing:.04em;text-transform:uppercase}
  .buttons{display:flex;flex-wrap:wrap;gap:10px;padding:16px 20px}
  .btn{flex:1 1 45%;min-height:46px;display:flex;align-items:center;justify-content:center;
    text-decoration:none;border-radius:10px;font-weight:600;font-size:15px;
    background:#eef1f6;color:var(--text);border:1px solid var(--line)}
  .btn--wa{background:var(--accent);color:var(--accent-ink);border-color:transparent}
  .section{padding:16px 20px;border-top:1px solid var(--line)}
  .section__title{font-size:13px;text-transform:uppercase;letter-spacing:.06em;
    color:var(--muted);margin:0 0 12px}
  .svc-cat{margin-bottom:16px}
  .svc-cat__title{font-size:16px;margin:0 0 8px}
  .svc-list{list-style:none;margin:0;padding:0}
  .svc{padding:8px 0;border-bottom:1px dashed var(--line)}
  .svc:last-child{border-bottom:0}
  .svc__row{display:flex;justify-content:space-between;gap:12px;align-items:baseline}
  .svc__name{font-weight:600}
  .svc__price{color:var(--accent);font-weight:600;white-space:nowrap}
  .svc__desc{margin:2px 0 0;color:var(--muted);font-size:14px}
  .featured{background:#f0f5ff}
  .featured__badge{display:inline-block;background:var(--accent);color:#fff;font-size:12px;
    font-weight:700;padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em}
  .featured__name{font-size:19px;margin:10px 0 4px}
  .featured__desc{margin:0 0 8px;color:var(--muted)}
  .featured__price{font-weight:700;color:var(--accent)}
  .hours,.address{margin:0}
  .address__map{display:inline-block;margin-top:8px;color:var(--accent);text-decoration:none;font-weight:600}
  .policies{margin:0;padding-left:18px;color:var(--muted)}
  .policies li{margin-bottom:4px}
  .qr__box{width:160px;height:160px;margin:0 auto;border:1px solid var(--line);border-radius:12px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#fafbfc}
  .qr__grid{width:96px;height:96px;border-radius:6px;
    background:
      repeating-linear-gradient(0deg,var(--text) 0 8px,transparent 8px 16px),
      repeating-linear-gradient(90deg,var(--text) 0 8px,transparent 8px 16px);
    opacity:.18}
  .qr__label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .qr__note{font-size:13px;color:var(--muted);text-align:center;margin:12px 0 0}
  .qr__url,.link__url{word-break:break-all;color:var(--accent);font-weight:600}
  .link__url{display:inline-block;text-decoration:none}
  .footer{padding:18px 20px;text-align:center;color:var(--muted);font-size:12px}
</style>
</head>
<body>
  <div class="wrap">
    <main class="card">
      <header class="head">
        {{LOGO_BLOCK}}
        <h1>{{BUSINESS_NAME}}</h1>
        <p class="tagline">{{SHORT_DESCRIPTION}}</p>
      </header>
      {{HERO_BLOCK}}
      {{BUTTONS_BLOCK}}
      {{FEATURED_BLOCK}}
      {{SERVICES_BLOCK}}
      {{HOURS_BLOCK}}
      {{ADDRESS_BLOCK}}
      {{POLICIES_BLOCK}}
      {{LINK_BLOCK}}
      {{QR_BLOCK}}
      {{FOOTER_BLOCK}}
    </main>
  </div>
</body>
</html>

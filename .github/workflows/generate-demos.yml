name: generate-demos

# Phase 2: valida que el generador produce las 12 demos (HTML + QR SVG) sin error.
# NO publica a GitHub Pages, NO usa secrets, NO depende de MyGuest.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies (if requirements.txt exists)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Generate the 12 demos
        run: python generator/generate_service_menu.py

      - name: Verify expected outputs exist (index.html + qr.svg per demo)
        run: |
          set -e
          demos="bella-spa studio-blush north-barber glow-nails aqua-wellness sage-studio pulse-fitness cafe-terra pawsome-grooming iron-ink-tattoo clarity-coaching horizon-tours"
          missing=0
          for slug in $demos; do
            for asset in index.html qr.svg; do
              path="public/demos/$slug/$asset"
              if [ ! -f "$path" ]; then
                echo "FALTA: $path"
                missing=1
              fi
            done
          done
          if [ "$missing" -ne 0 ]; then
            echo "Faltan archivos esperados."
            exit 1
          fi
          echo "OK: las 12 demos tienen index.html y qr.svg."

      - name: Verify no unreplaced {{...}} tokens in generated HTML
        run: |
          if grep -rl "{{" public/demos/ ; then
            echo "Hay tokens {{...}} sin reemplazar en la salida."
            exit 1
          fi
          echo "OK: sin tokens residuales."

      - name: Verify no obvious secrets committed
        run: |
          # Matches secret-shaped VALUES (Stripe/OpenAI key prefixes, PEM
          # headers), not mere mentions of words like "api_key" or "bearer"
          # that legitimately appear in code/comments/docstrings.
          if grep -rnE "sk_live_[A-Za-z0-9]+|sk_test_[A-Za-z0-9]+|rk_live_[A-Za-z0-9]+|sk-proj-[A-Za-z0-9_-]{10,}|sk-[A-Za-z0-9]{20,}|-----BEGIN [A-Z ]*PRIVATE KEY-----" \
               generator/ data/ public/ ; then
            echo "Posible secreto detectado."
            exit 1
          fi
          echo "OK: sin secrets obvios."

      - name: Verify no MyGuest references in code/data/output
        run: |
          if grep -rnil "myguest" generator/ data/ public/ ; then
            echo "Referencia a MyGuest encontrada en code/data/output."
            exit 1
          fi
          echo "OK: sin referencias a MyGuest."

      - name: Verify generated output is committed (no drift)
        run: |
          if ! git diff --exit-code ; then
            echo "El generador produjo cambios en archivos tracked que no estan commiteados."
            echo "Regenera localmente y commitea el output (index.html / qr.svg)."
            exit 1
          fi
          echo "OK: el output regenerado coincide con lo commiteado."
